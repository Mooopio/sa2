<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --card-glow: 0 0 30px rgba(0,212,255,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.06) 0%, transparent 60%);
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1526 0%, #111827 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-title {
    font-size: 1.15rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .header-sub {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 400;
  }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-bar-outer {
    width: 140px;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }
  .progress-label {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'Fira Mono', monospace;
    white-space: nowrap;
  }

  .scoreboard {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .score-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 0.78rem;
    font-family: 'Fira Mono', monospace;
  }
  .score-chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }

  /* SECTION DIVIDER */
  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 36px 0 20px;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }
  .section-tag {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent2);
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.25);
    padding: 4px 12px;
    border-radius: 99px;
    white-space: nowrap;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--card-glow);
    transition: border-color 0.3s;
    position: relative;
    overflow: hidden;
  }
  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .q-card.answered::before { opacity: 1; }
  .q-card.correct { border-color: rgba(16,185,129,0.4); }
  .q-card.wrong { border-color: rgba(239,68,68,0.3); }

  .q-number {
    font-family: 'Fira Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 8px;
    opacity: 0.7;
  }
  .q-text {
    font-size: 0.97rem;
    font-weight: 600;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 18px;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: right;
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,212,255,0.05);
    transform: translateX(-2px);
  }
  .option-btn:disabled { cursor: default; }
  .option-letter {
    font-family: 'Fira Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
    transition: all 0.2s;

  .option-text { flex: 1; line-height: 1.5; }

  .option-btn.selected-pending {
    border-color: var(--accent);
    background: rgba(0,212,255,0.08);
  }
  .option-btn.selected-pending .option-letter {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* States */
  .option-btn.selected-correct {
    border-color: var(--green);
    background: rgba(16,185,129,0.08);
  }
  .option-btn.selected-correct .option-letter {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }
  .option-btn.selected-wrong {
    border-color: var(--red);
    background: rgba(239,68,68,0.08);
  }
  .option-btn.selected-wrong .option-letter {
    background: var(--red);
    color: #fff;
    border-color: var(--red);
  }
  .option-btn.show-correct {
    border-color: rgba(16,185,129,0.5);
    background: rgba(16,185,129,0.05);
  }
  .option-btn.show-correct .option-letter {
    background: rgba(16,185,129,0.3);
    color: var(--green);
    border-color: var(--green);

  .feedback-badge {
    display: none;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 700;

  .feedback-badge.correct-fb {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    color: var(--green);
  }
  .feedback-badge.wrong-fb {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--red);
  }

  #results-panel {
    display: none;
    margin-top: 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 28px;

    width: 120px; height: 120px;
    border-radius: 50%;

    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    position: relative;

  .result-score-ring-inner {
    width: 88px; height: 88px;
    background: var(--surface);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fira Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
  }
  .result-title {
    font-size: 1.5rem;
    font-weight: 900;
    margin-bottom: 8px;
  }
  .result-subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    min-width: 100px;
  }
  .stat-num { font-family: 'Fira Mono', monospace; font-size: 1.6rem; font-weight: 700; }
  .stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .stat-green .stat-num { color: var(--green); }
  .stat-red .stat-num { color: var(--red); }
  .stat-yellow .stat-num { color: var(--yellow); }

  .reset-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 14px 36px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
  }
  .reset-btn:hover { opacity: 0.9; transform: scale(1.03); }

  /* FLOATING SUBMIT */


  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-card { animation: fadeUp 0.4s ease both; }

  /* Responsive */
  @media (max-width: 600px) {
    .header-inner { flex-direction: column; align-items: flex-start; }
    .progress-wrap { width: 100%; justify-content: space-between; }
    .progress-bar-outer { flex: 1; }
    .q-card { padding: 18px 14px; }
    .option-btn { font-size: 0.84rem; padding: 11px 12px; gap: 10px; }
    .result-stats { gap: 12px; }
    .stat-box { padding: 12px 16px; min-width: 80px; }
  }
</style>

const letters = ['a', 'b', 'c', 'd'];
let answered = new Array(QUESTIONS.length).fill(false);
let userChoices = new Array(QUESTIONS.length).fill(null);
let correctCount = 0, wrongCount = 0;
let submitted = false;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  let currentSection = '';
  let html = '';

  QUESTIONS.forEach((q, idx) => {
    if (q.section && q.section !== currentSection) {
      currentSection = q.section;
      html += `
        <div class="section-header">
          <div class="section-tag">${currentSection}</div>
          <div class="section-line"></div>
        </div>`;
    }

    const optionsHtml = q.options.map((opt, i) => `
      <button class="option-btn" id="opt-${idx}-${i}" onclick="choose(${idx}, ${i})" data-q="${idx}" data-i="${i}">
        <span class="option-letter">${letters[i]}</span>
        <span class="option-text">${opt}</span>
      </button>
    `).join('');

    html += `
      <div class="q-card" id="card-${idx}" style="animation-delay:${Math.min(idx*0.03, 0.5)}s">
        <div class="q-number">سؤال ${q.num} / ${QUESTIONS.length}</div>
        <div class="q-text">${q.text}</div>
        <div class="options">${optionsHtml}</div>
        <div class="feedback-badge" id="fb-${idx}"></div>
      </div>`;
  });

  html += `
    <div id="results-panel">
      <div class="result-score-ring" id="score-ring" style="--pct:0%">
        <div class="result-score-ring-inner" id="ring-text">0%</div>
      </div>
      <div class="result-title" id="res-title">النتيجة</div>
      <div class="result-subtitle" id="res-sub"></div>
      <div class="result-stats">
        <div class="stat-box stat-green"><div class="stat-num" id="res-correct">0</div><div class="stat-lbl">إجابات صحيحة</div></div>
        <div class="stat-box stat-red"><div class="stat-num" id="res-wrong">0</div><div class="stat-lbl">إجابات خاطئة</div></div>
        <div class="stat-box stat-yellow"><div class="stat-num" id="res-skip">0</div><div class="stat-lbl">لم تُجب</div></div>
      </div>
      <button class="reset-btn" onclick="resetQuiz()">↺ إعادة الاختبار</button>
    </div>`;

  container.innerHTML = html;
  updateProgress();
}

function choose(qIdx, optIdx) {
  if (submitted) return;

  const q = QUESTIONS[qIdx];

  // Remove previous selection for this question
  q.options.forEach((_, i) => {
    document.getElementById(`opt-${qIdx}-${i}`).classList.remove('selected-pending');
  });

  // Save choice and mark
  userChoices[qIdx] = optIdx;
  answered[qIdx] = true;
  document.getElementById(`opt-${qIdx}-${optIdx}`).classList.add('selected-pending');
  document.getElementById(`card-${qIdx}`).classList.add('answered');

  updateProgress();
}

function updateProgress() {
  const done = answered.filter(Boolean).length;
  const total = QUESTIONS.length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${done} / ${total}`;
}

function submitQuiz() {
  submitted = true;
  document.getElementById('submit-btn').disabled = true;
  correctCount = 0; wrongCount = 0;

  // Correct ALL questions at once
  QUESTIONS.forEach((q, idx) => {
    const chosen = userChoices[idx];
    const isCorrect = chosen !== null && chosen === q.answer;
    const skipped = chosen === null;

    // Disable all buttons
    q.options.forEach((_, i) => {
      document.getElementById(`opt-${idx}-${i}`).disabled = true;
      document.getElementById(`opt-${idx}-${i}`).classList.remove('selected-pending');
    });

    if (!skipped) {
      // Show user's choice
      document.getElementById(`opt-${idx}-${chosen}`).classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
      // If wrong, reveal correct
      if (!isCorrect) {
        document.getElementById(`opt-${idx}-${q.answer}`).classList.add('show-correct');
        wrongCount++;
      } else {
        correctCount++;
      }
    } else {
      // Unanswered — show correct
      document.getElementById(`opt-${idx}-${q.answer}`).classList.add('show-correct');
    }

    // Feedback badge
    const fb = document.getElementById(`fb-${idx}`);
    if (isCorrect) {
      fb.classList.add('show', 'correct-fb');
      fb.innerHTML = `<span>✓</span> إجابة صحيحة!`;
    } else if (skipped) {
      fb.classList.add('show', 'wrong-fb');
      fb.innerHTML = `<span>—</span> لم تُجب — الإجابة: <strong>${letters[q.answer].toUpperCase()}. ${q.options[q.answer]}</strong>`;
    } else {
      fb.classList.add('show', 'wrong-fb');
      fb.innerHTML = `<span>✗</span> خطأ — الإجابة الصحيحة: <strong>${letters[q.answer].toUpperCase()}. ${q.options[q.answer]}</strong>`;
    }

    // Card color
    const card = document.getElementById(`card-${idx}`);
    card.classList.remove('answered');
    card.classList.add(isCorrect ? 'correct' : 'wrong');
  });

  document.getElementById('score-correct').textContent = correctCount;
  document.getElementById('score-wrong').textContent = wrongCount;

  const skippedCount = userChoices.filter(v => v === null).length;
  const total = QUESTIONS.length;
  const pct = Math.round((correctCount / total) * 100);

  // Show results
  const panel = document.getElementById('results-panel');
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });

  document.getElementById('score-ring').style.setProperty('--pct', pct + '%');
  document.getElementById('ring-text').textContent = pct + '%';
  document.getElementById('res-correct').textContent = correctCount;
  document.getElementById('res-wrong').textContent = wrongCount;
  document.getElementById('res-skip').textContent = skippedCount;

  let title = '', sub = '';
  if (pct >= 90) { title = '🏆 ممتاز!'; sub = 'أداء رائع جداً، استمر!'; }
  else if (pct >= 75) { title = '✅ جيد جداً'; sub = 'نتيجة قوية، راجع الأخطاء.'; }
  else if (pct >= 60) { title = '📖 جيد'; sub = 'تحتاج مراجعة بعض المفاهيم.'; }
  else { title = '💪 حاول مرة أخرى'; sub = 'راجع المادة وأعد الاختبار.'; }

  document.getElementById('res-title').textContent = title;
  document.getElementById('res-sub').textContent = sub + ` — درجتك: ${correctCount} / ${total}`;
  updateProgress();
}

function resetQuiz() {
  answered = new Array(QUESTIONS.length).fill(false);
  userChoices = new Array(QUESTIONS.length).fill(null);
  correctCount = 0; wrongCount = 0;
  submitted = false;
  document.getElementById('score-correct').textContent = 0;
  document.getElementById('score-wrong').textContent = 0;
  document.getElementById('submit-btn').disabled = false;
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
