<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IS 352 — Exam Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0d12;
  --bg2: #111318;
  --bg3: #171a22;
  --surface: #1c2030;
  --surface2: #222738;
  --border: #2a3048;
  --border2: #353d5a;
  --accent: #5b8ef0;
  --accent2: #8b5cf6;
  --text: #e8eaf2;
  --text2: #8a95b0;
  --text3: #4a5270;
  --success-bg: rgba(34,197,94,0.12);
  --success-border: rgba(34,197,94,0.4);
  --success-text: #4ade80;
  --danger-bg: rgba(239,68,68,0.12);
  --danger-border: rgba(239,68,68,0.4);
  --danger-text: #f87171;
  --mid-color: #f59e0b;
  --fin-color: #38bdf8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* ── HEADER ── */
.site-header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 860px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  gap: 1rem;
  flex-wrap: wrap;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.05rem;
  color: var(--accent);
  letter-spacing: -0.02em;
  white-space: nowrap;
}
.logo span { color: var(--text2); font-weight: 400; font-size: 0.78rem; margin-left: 6px; }
.score-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.score-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 4px 14px;
  font-size: 0.8rem;
}
.score-pill .num {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
}
.score-pill .num.green { color: var(--success-text); }
.score-pill .num.red { color: var(--danger-text); }
.score-pill .lbl { color: var(--text2); font-size: 0.72rem; }

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-inner {
  max-width: 860px;
  margin: 0 auto;
  display: flex;
  gap: 4px;
  padding: 8px 0;
}
.f-btn {
  padding: 6px 16px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 0.78rem;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
}
.f-btn:hover { border-color: var(--border2); color: var(--text); }
.f-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

/* ── PROGRESS ── */
.progress-section {
  background: var(--bg2);
  padding: 10px 1.5rem;
  border-bottom: 1px solid var(--border);
}
.progress-inner { max-width: 860px; margin: 0 auto; }
.progress-track {
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-label {
  font-size: 0.72rem;
  color: var(--text3);
  margin-top: 5px;
  display: flex;
  justify-content: space-between;
}

/* ── MAIN ── */
main {
  max-width: 860px;
  margin: 0 auto;
  padding: 1.5rem 1.5rem 5rem;
}

/* ── RESULT BANNER ── */
.result-banner {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  text-align: center;
  margin-bottom: 1.5rem;
  display: none;
  animation: fadeUp 0.3s ease;
}
.result-banner.show { display: block; }
.result-score {
  font-family: 'Syne', sans-serif;
  font-size: 3rem;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
}
.result-pct {
  font-size: 1rem;
  color: var(--text2);
  margin-top: 6px;
}
.result-grade {
  font-size: 1.2rem;
  font-weight: 600;
  margin-top: 12px;
}
.result-grade.a { color: var(--success-text); }
.result-grade.b { color: var(--mid-color); }
.result-grade.c { color: var(--danger-text); }
.reset-btn {
  margin-top: 1rem;
  padding: 10px 28px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text);
  font-size: 0.88rem;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.reset-btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }

/* ── QUESTION CARD ── */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
  transition: border-color 0.2s;
  animation: fadeUp 0.25s ease both;
}
.q-card:hover { border-color: var(--border2); }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.q-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.q-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--text3);
  font-weight: 500;
}
.source-badge {
  padding: 2px 10px;
  border-radius: 100px;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.badge-mid { background: rgba(245,158,11,0.15); color: var(--mid-color); border: 1px solid rgba(245,158,11,0.3); }
.badge-fin { background: rgba(56,189,248,0.12); color: var(--fin-color); border: 1px solid rgba(56,189,248,0.25); }
.q-text {
  font-size: 0.92rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.55;
  margin-bottom: 1rem;
}
.opts { display: flex; flex-direction: column; gap: 7px; }
.opt {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 9px;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--bg3);
  user-select: none;
}
.opt:hover:not(.locked) {
  border-color: var(--border2);
  background: var(--surface2);
}
.opt.locked { cursor: default; }
.opt.correct {
  border-color: var(--success-border);
  background: var(--success-bg);
}
.opt.wrong {
  border-color: var(--danger-border);
  background: var(--danger-bg);
  opacity: 0.75;
}
.opt-letter {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--text3);
  min-width: 18px;
  margin-top: 2px;
  font-weight: 500;
}
.opt-text {
  font-size: 0.87rem;
  color: var(--text2);
  line-height: 1.45;
}
.opt.correct .opt-text,
.opt.correct .opt-letter { color: var(--success-text); font-weight: 500; }
.opt.wrong .opt-text,
.opt.wrong .opt-letter { color: var(--danger-text); }

/* ── FEEDBACK ── */
.feedback {
  margin-top: 10px;
  padding: 10px 14px;
  border-radius: 9px;
  font-size: 0.84rem;
  line-height: 1.55;
  display: none;
  border-left: 3px solid transparent;
}
.feedback.show { display: block; animation: fadeUp 0.2s ease; }
.feedback.ok {
  border-left-color: var(--success-border);
  background: var(--success-bg);
  color: var(--success-text);
}
.feedback.bad {
  border-left-color: var(--danger-border);
  background: var(--danger-bg);
  color: #fca5a5;
}
.feedback .fb-head {
  font-weight: 600;
  font-size: 0.82rem;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.feedback .fb-body { color: var(--text2); font-size: 0.82rem; margin-top: 4px; }
.feedback.ok .fb-body { color: #86efac; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text3);
  font-size: 0.9rem;
  display: none;
}
.empty-state.show { display: block; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .site-header { padding: 0 1rem; }
  .header-inner { height: auto; padding: 10px 0; }
  .logo span { display: none; }
  main { padding: 1rem 1rem 4rem; }
  .q-card { padding: 1rem 1rem; }
  .result-score { font-size: 2.2rem; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">IS 352 <span>System Analysis &amp; Design — Exam Quiz</span></div>
    <div class="score-row">
      <div class="score-pill">
        <span class="num" id="sAnswered">0</span>
        <span class="lbl">/ <span id="sTotal">56</span> done</span>
      </div>
      <div class="score-pill">
        <span class="num green" id="sCorrect">0</span>
        <span class="lbl">correct</span>
      </div>
      <div class="score-pill">
        <span class="num red" id="sWrong">0</span>
        <span class="lbl">wrong</span>
      </div>
    </div>
  </div>
</header>

<div class="filter-bar">
  <div class="filter-inner">
    <button class="f-btn active" onclick="setFilter('all',this)">All (56)</button>
    <button class="f-btn" onclick="setFilter('mid',this)">Midterm 2026 (25)</button>
    <button class="f-btn" onclick="setFilter('fin',this)">Final 2024 (31)</button>
  </div>
</div>

<div class="progress-section">
  <div class="progress-inner">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label">
      <span id="progLeft">0 answered</span>
      <span id="progPct">0%</span>
    </div>
  </div>
</div>

<main>
  <div class="result-banner" id="resultBanner">
    <div class="result-score" id="resultScore">0/0</div>
    <div class="result-pct" id="resultPct"></div>
    <div class="result-grade" id="resultGrade"></div>
    <button class="reset-btn" onclick="resetAll()">↺ Reset &amp; Try Again</button>
  </div>
  <div class="empty-state" id="emptyState">No questions match this filter.</div>
  <div id="qContainer"></div>
</main>

<script>
const ALL_QUESTIONS = [
  /* ════════════════════════════ MIDTERM 2026 ════════════════════════════ */
  {
    id: 1, src: 'mid',
    q: "When deciding between monolithic, SOA, and microservices for a project, which consideration is most important to evaluate first?",
    opts: [
      "The availability of an enterprise service bus product with vendor support",
      "Team organization, release cadence, scalability needs, and the operational maturity to manage distributed systems",
      "Whether all services can be written in the same programming language to avoid integration issues",
      "The requirement to deploy everything on a single physical server to reduce costs"
    ],
    ans: 1,
    exp: "Architecture decisions must align with team structure, delivery speed, scalability needs, and ability to operate distributed systems — NOT tooling or language constraints. Choosing microservices for a team that can't operate them creates more problems than it solves."
  },
  {
    id: 2, src: 'mid',
    q: "Which of the following is a characteristic of the Waterfall methodology?",
    opts: [
      "Emphasizes adaptability and flexibility",
      "Progress flows down in linear sequential phases",
      "Requires continuous customer collaboration",
      "Uses iterations and incremental development"
    ],
    ans: 1,
    exp: "Waterfall is a plan-driven, linear-sequential model. Each phase (Requirements → Design → Implementation → Testing → Deployment) flows downward like a waterfall, with no going back to previous phases."
  },
  {
    id: 3, src: 'mid',
    q: "Which artifact provides a transparent, ordered list of everything that is known to be needed in the product?",
    opts: [
      "Sprint Backlog",
      "Increment",
      "Product Backlog",
      "Definition of Done"
    ],
    ans: 2,
    exp: "The Product Backlog is the single, ordered, transparent list of all known product needs. The Sprint Backlog is the subset selected for one sprint. The Increment is the output. Definition of Done is a quality checklist."
  },
  {
    id: 4, src: 'mid',
    q: "A team practicing Agile notices recurring work left undone each sprint because stories are too large. Which practice is the best immediate remedy?",
    opts: [
      "Increase sprint length so large stories can be completed",
      "Break large stories into smaller, independently valuable backlog items",
      "Assign more developers to the large stories to finish them faster",
      "Remove acceptance criteria to simplify completion"
    ],
    ans: 1,
    exp: "The root cause is story size. Breaking into smaller, independently deliverable items is the core Agile technique (story splitting). Increasing sprint length postpones the problem. Removing acceptance criteria lowers quality. Adding developers doesn't split the work logically."
  },
  {
    id: 5, src: 'mid',
    q: "In Scrum, which role is primarily responsible for maximizing the value of the product and managing the product backlog?",
    opts: [
      "Scrum Master",
      "Development Team Lead",
      "Product Owner",
      "Project Sponsor"
    ],
    ans: 2,
    exp: "The Product Owner (PO) owns the Product Backlog — orders it, refines it, and ensures the team works on highest-value items. Scrum Master facilitates the process. Dev Team builds. There is no 'Team Lead' role in Scrum."
  },
  {
    id: 6, src: 'mid',
    q: "Which of the triple constraints is fixed when implementing the Waterfall methodology?",
    opts: [
      "Time",
      "Cost",
      "Scope",
      "Effort"
    ],
    ans: 2,
    exp: "In Waterfall, Scope is fixed upfront during the requirements phase and defined in a contract. Time and Cost may be adjusted, but the scope is the agreed deliverable that doesn't change."
  },
  {
    id: 7, src: 'mid',
    q: "Which component contains the actual source code, libraries, and runtime that perform the business logic of the service?",
    opts: [
      "The contract",
      "The interface",
      "The implementation",
      "The API gateway"
    ],
    ans: 2,
    exp: "The Implementation is the internal engine — contains source code, libraries, and runtime. The contract/interface defines how consumers interact with the service externally. The API gateway routes and manages traffic."
  },
  {
    id: 8, src: 'mid',
    q: "Which architecture is more suitable for small, simple applications?",
    opts: [
      "Microservices",
      "Monolithic",
      "Hybrid",
      "Edge"
    ],
    ans: 1,
    exp: "Monolithic architecture is simpler to develop, test, and deploy for small applications. Microservices add significant overhead (networking, service discovery, distributed tracing, deployment complexity) that isn't justified for simple systems."
  },
  {
    id: 9, src: 'mid',
    q: "Which component primarily specifies the methods, endpoints, message formats, and expected inputs/outputs that a consumer uses to call a service?",
    opts: [
      "The implementation",
      "The business logic",
      "The contract",
      "The deployment pipeline"
    ],
    ans: 2,
    exp: "The Contract (API contract / interface definition) specifies exactly how consumers interact — endpoints, HTTP methods, message formats, inputs, and outputs. It is separate from the internal implementation."
  },
  {
    id: 10, src: 'mid',
    q: "What is a common approach to scaling in microservices architecture?",
    opts: [
      "Horizontal scaling",
      "Vertical scaling",
      "No scaling needed",
      "Static scaling of the entire system"
    ],
    ans: 0,
    exp: "Microservices scale horizontally — you spin up more instances of only the services under load. This is far more efficient than vertically scaling an entire monolith or scaling all services uniformly."
  },
  {
    id: 11, src: 'mid',
    q: "What is the primary purpose of service discovery in SOA?",
    opts: [
      "To encrypt messages between consumers and providers",
      "To allow consumers to locate available services dynamically",
      "To replace the need for an Enterprise Service Bus",
      "To store the source code of all services"
    ],
    ans: 1,
    exp: "Service discovery allows consumers to dynamically find service instances without hardcoding locations. As services scale and move, their URLs change — service discovery (like Consul or Eureka) keeps track of live instances."
  },
  {
    id: 12, src: 'mid',
    q: "Which ceremony is focused on inspecting and adapting the team's processes?",
    opts: [
      "Sprint Planning",
      "Sprint Review",
      "Daily Scrum",
      "Sprint Retrospective"
    ],
    ans: 3,
    exp: "Sprint Retrospective = team inspects HOW they worked and improves their processes. Sprint Review = inspect the product increment with stakeholders. Sprint Planning = plan the sprint. Daily Scrum = 15-min daily sync."
  },
  {
    id: 13, src: 'mid',
    q: "What is an advantage of using containers like Docker in microservices architecture?",
    opts: [
      "Tight coupling between services",
      "Cross-platform compatibility issues",
      "Standardized environment across services",
      "Increased dependency on server configurations"
    ],
    ans: 2,
    exp: "Docker containers package the app with all its dependencies, creating a standardized environment that runs identically on any machine. This eliminates 'works on my machine' problems and ensures consistency across dev, test, and production."
  },
  {
    id: 14, src: 'mid',
    q: "Which protocol is commonly used for synchronous communication in SOA with web services?",
    opts: [
      "UDP",
      "FTP",
      "SOAP",
      "SMTP"
    ],
    ans: 2,
    exp: "SOAP (Simple Object Access Protocol) is the standard protocol for synchronous web service communication in SOA. It uses XML over HTTP and supports WS-Security, WS-ReliableMessaging, and other enterprise standards."
  },
  {
    id: 15, src: 'mid',
    q: "What is a disadvantage of monolithic architecture?",
    opts: [
      "High network latency",
      "Complex service orchestration",
      "Difficult to scale specific components",
      "Expensive initial setup"
    ],
    ans: 2,
    exp: "In a monolith, you cannot scale just the checkout service — you must scale the entire application. High network latency and service orchestration are microservices problems. Monoliths are actually cheaper to set up initially."
  },
  {
    id: 16, src: 'mid',
    q: "Which tool is used for continuous integration?",
    opts: [
      "Puppet",
      "Splunk",
      "Nagios",
      "Jenkins"
    ],
    ans: 3,
    exp: "Jenkins is the industry-standard CI tool that automates build, test, and deployment pipelines. Puppet = infrastructure configuration management. Splunk = log analysis. Nagios = infrastructure monitoring."
  },
  {
    id: 17, src: 'mid',
    q: "What is a benefit of microservices in terms of technology stack?",
    opts: [
      "Limited flexibility in technology choices",
      "Standardized technology stack across services",
      "No interoperability issues",
      "Ability to use different technologies for different services"
    ],
    ans: 3,
    exp: "Microservices enable polyglot development — each service can use the best technology for its job (Python for ML, Go for performance, Node.js for real-time). This is a key advantage over monoliths where the entire app uses one stack."
  },
  {
    id: 18, src: 'mid',
    q: "Which architecture style provides the best support for polyglot persistence?",
    opts: [
      "Monolithic",
      "Microservices",
      "Traditional n-tier",
      "Single database architecture"
    ],
    ans: 1,
    exp: "Microservices' 'database per service' pattern enables polyglot persistence — each service uses the best database for its needs (PostgreSQL, MongoDB, Redis, Cassandra, etc.). Monoliths typically share one database type."
  },
  {
    id: 19, src: 'mid',
    q: "Who owns the Sprint Retrospective process?",
    opts: [
      "Product Owner",
      "Scrum Master",
      "Development Team",
      "Stakeholders"
    ],
    ans: 1,
    exp: "The Scrum Master facilitates and owns the Sprint Retrospective process. The Scrum Master ensures the team has a productive retrospective and that action items are captured. Note: The entire Scrum Team attends, but the SM runs it."
  },
  {
    id: 20, src: 'mid',
    q: "Which SOA principle encourages services to be designed so they can be used by multiple different applications?",
    opts: [
      "Service autonomy",
      "Service reusability",
      "Service granularity",
      "Service discoverability"
    ],
    ans: 1,
    exp: "Service reusability means designing services as generic, reusable components usable by multiple applications. Autonomy = independent operation. Granularity = size/scope of service. Discoverability = ability to find services."
  },
  {
    id: 21, src: 'mid',
    q: "Which of the following is an example of plan-driven software process models?",
    opts: [
      "Scrum",
      "Waterfall",
      "Kanban",
      "eXtreme Programming"
    ],
    ans: 1,
    exp: "Waterfall is the classic plan-driven model — all planning happens upfront before any implementation. Scrum, Kanban, and XP are all Agile (adaptive/iterative) methodologies."
  },
  {
    id: 22, src: 'mid',
    q: "In the service registry model, what is the first step that occurs?",
    opts: [
      "Consumer binds to the service provider",
      "Consumer queries the registry for a service",
      "Service provider registers its service in the public registry",
      "Registry provides the contract and endpoint address"
    ],
    ans: 2,
    exp: "The service registry flow: (1) Provider REGISTERS in registry → (2) Consumer QUERIES registry → (3) Registry returns contract/endpoint → (4) Consumer BINDS directly to provider. Registration is always the first step."
  },
  {
    id: 23, src: 'mid',
    q: "Which factor is most important when deciding to adopt microservices?",
    opts: [
      "Team size",
      "Business complexity and scalability needs",
      "Programming language preference",
      "Database type"
    ],
    ans: 1,
    exp: "Business complexity and scalability needs are the primary drivers. Microservices solve the problems of large, complex, high-scale systems. Language preference and DB type are secondary technical choices made after architecture is decided."
  },
  {
    id: 24, src: 'mid',
    q: "Which of the following are agile methodologies EXCEPT:",
    opts: [
      "eXtreme Programming",
      "Spiral",
      "Kanban",
      "Scrum"
    ],
    ans: 1,
    exp: "Spiral is NOT an Agile methodology — it's a risk-driven, iterative model that is plan-driven (like Waterfall but with risk analysis loops). XP, Kanban, and Scrum are all Agile methodologies. Spiral predates the Agile Manifesto."
  },
  {
    id: 25, src: 'mid',
    q: "When integrating a legacy application with modern services using an ESB, which advantage does the ESB most commonly provide?",
    opts: [
      "It eliminates the need to test the legacy application after integration",
      "It allows direct modification of the legacy application's source code",
      "It enables protocol and data-format translation so the legacy system can interoperate without major internal changes",
      "It guarantees zero-latency communication between the legacy and modern systems"
    ],
    ans: 2,
    exp: "The ESB's primary value is protocol and data-format translation (e.g., converting SOAP to REST, XML to JSON). This lets legacy systems participate in modern architectures without rewriting their internal code. Zero-latency is impossible; ESBs actually add some latency."
  },

  /* ════════════════════════════ FINAL 2024 ════════════════════════════ */

/* ── STATE ── */
let answered = 0;
let correct = 0;
let wrong = 0;
let currentFilter = 'all';
let visibleQs = [];

/* ── FILTER ── */
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuestions();
  updateStats();
}

/* ── RENDER ── */
function renderQuestions() {
  const container = document.getElementById('qContainer');
  const emptyState = document.getElementById('emptyState');
  
  visibleQs = currentFilter === 'all'
    ? ALL_QUESTIONS
    : ALL_QUESTIONS.filter(q => q.src === currentFilter);

  document.getElementById('sTotal').textContent = visibleQs.length;
  
  if (visibleQs.length === 0) {
    emptyState.classList.add('show');
    container.innerHTML = '';
    return;
  }
  emptyState.classList.remove('show');

  container.innerHTML = visibleQs.map((q, idx) => {
    const letters = ['a', 'b', 'c', 'd'];
    const optsHtml = q.opts.map((o, oi) => `
      <div class="opt" id="opt-${q.id}-${oi}" onclick="checkAnswer(${q.id}, ${oi})">
        <span class="opt-letter">${letters[oi]}.</span>
        <span class="opt-text">${o}</span>
      </div>
    `).join('');

    return `
      <div class="q-card" id="qcard-${q.id}" style="animation-delay:${idx * 0.025}s">
        <div class="q-meta">
          <span class="q-num">Q${String(idx + 1).padStart(2, '0')}</span>
          <span class="source-badge ${q.src === 'mid' ? 'badge-mid' : 'badge-fin'}">
            ${q.src === 'mid' ? 'Midterm 2026' : 'Final 2024'}
          </span>
        </div>
        <div class="q-text">${q.q}</div>
        <div class="opts" id="opts-${q.id}">${optsHtml}</div>
        <div class="feedback" id="fb-${q.id}"></div>
      </div>
    `;
  }).join('');
}

/* ── CHECK ANSWER ── */
function checkAnswer(qId, chosenIdx) {
  const card = document.getElementById(`qcard-${qId}`);
  if (card.dataset.answered) return;
  card.dataset.answered = '1';

  const q = ALL_QUESTIONS.find(x => x.id === qId);
  const isCorrect = chosenIdx === q.ans;
  const letters = ['a', 'b', 'c', 'd'];

  const opts = document.querySelectorAll(`#opts-${qId} .opt`);
  opts.forEach((opt, i) => {
    opt.classList.add('locked');
    if (i === q.ans) opt.classList.add('correct');
    else if (i === chosenIdx) opt.classList.add('wrong');
  });

  const fb = document.getElementById(`fb-${qId}`);
  fb.className = `feedback show ${isCorrect ? 'ok' : 'bad'}`;
  fb.innerHTML = `
    <div class="fb-head">
      ${isCorrect
        ? '<span>✓ Correct!</span>'
        : `<span>✗ Wrong — Correct answer: (${letters[q.ans].toUpperCase()}) ${q.opts[q.ans]}</span>`
      }
    </div>
    <div class="fb-body">${q.exp}</div>
  `;

  if (isCorrect) correct++; else wrong++;
  answered++;

  updateStats();
  checkCompletion();
}

/* ── STATS ── */
function updateStats() {
  document.getElementById('sAnswered').textContent = answered;
  document.getElementById('sCorrect').textContent = correct;
  document.getElementById('sWrong').textContent = wrong;

  const total = visibleQs.length;
  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progLeft').textContent = `${answered} answered`;
  document.getElementById('progPct').textContent = pct + '%';
}

/* ── COMPLETION ── */
function checkCompletion() {
  const total = visibleQs.length;
  if (answered < total) return;

  const pct = Math.round((correct / total) * 100);
  const banner = document.getElementById('resultBanner');
  document.getElementById('resultScore').textContent = `${correct} / ${total}`;
  document.getElementById('resultPct').textContent = `Score: ${pct}%`;

  let grade, cls;
  if (pct >= 85) { grade = '🏆 Excellent! You are ready for the exam.'; cls = 'a'; }
  else if (pct >= 65) { grade = '👍 Good — review your wrong answers.'; cls = 'b'; }
  else { grade = '📚 Needs more study — review all explanations.'; cls = 'c'; }

  const gradeEl = document.getElementById('resultGrade');
  gradeEl.textContent = grade;
  gradeEl.className = `result-grade ${cls}`;
  banner.classList.add('show');
  banner.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── RESET ── */
function resetAll() {
  answered = 0; correct = 0; wrong = 0;
  document.getElementById('resultBanner').classList.remove('show');
  updateStats();
  renderQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── INIT ── */
renderQuestions();
updateStats();
</script>
