<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps & Scrum Quiz – Lec 3 & 4</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --card: #0f1419;
    --border: #1e2a38;
    --accent: #0ea5e9;
    --accent2: #f97316;
    --correct: #22c55e;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --gold: #f59e0b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 0 0 80px;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(14,165,233,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(14,165,233,0.04) 1px, transparent 1px);
    background-size:44px 44px;
    pointer-events:none; z-index:0;
  }
  .hero {
    position:relative; text-align:center;
    padding:60px 20px 36px; z-index:1;
  }
  .hero-tag {
    display:inline-block;
    background:rgba(14,165,233,0.12);
    border:1px solid var(--accent);
    color:var(--accent);
    font-size:11px; letter-spacing:3px;
    padding:6px 16px; border-radius:2px;
    margin-bottom:18px; text-transform:uppercase;
  }
  .hero h1 {
    font-family:'Syne',sans-serif;
    font-size:clamp(2rem,5vw,3.4rem);
    font-weight:800; line-height:1.1;
    background:linear-gradient(135deg,#fff 0%,var(--accent) 60%,var(--accent2) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; margin-bottom:12px;
  }
  .hero p { color:var(--muted); font-size:13px; letter-spacing:1px; }

  .scorebar {
    position:sticky; top:0; z-index:100;
    background:rgba(8,12,16,0.93);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    display:flex; justify-content:center; gap:40px;
    padding:14px 20px;
  }
  .score-item { text-align:center; }
  .score-num { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800; }
  .score-label { font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  #score-correct { color:var(--correct); }
  #score-wrong   { color:var(--wrong); }
  #score-total   { color:var(--accent); }
  #score-pct     { color:var(--gold); }

  .section-header {
    position:relative; z-index:1;
    max-width:860px; margin:50px auto 24px;
    padding:0 20px;
    display:flex; align-items:center; gap:14px;
  }
  .section-badge {
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff; font-family:'Syne',sans-serif;
    font-size:11px; font-weight:700; letter-spacing:2px;
    padding:6px 14px; border-radius:2px;
    white-space:nowrap; text-transform:uppercase;
  }
  .section-title { font-family:'Syne',sans-serif; font-size:1.1rem; color:#fff; }
  .section-line { flex:1; height:1px; background:var(--border); }

  .quiz-container {
    max-width:860px; margin:0 auto; padding:0 20px;
    position:relative; z-index:1;
    display:flex; flex-direction:column; gap:18px;
  }

  .q-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px; overflow:hidden;
    transition:border-color 0.2s;
    animation:slideIn 0.3s ease both;
  }
  .q-card:hover { border-color:#2a3a50; }

  .q-header { display:flex; align-items:flex-start; gap:14px; padding:20px 22px 16px; }
  .q-num {
    background:rgba(14,165,233,0.12);
    color:var(--accent);
    font-family:'Syne',sans-serif; font-size:12px; font-weight:700;
    min-width:36px; height:36px; border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; border:1px solid rgba(14,165,233,0.25);
  }
  .q-text { font-size:13.5px; line-height:1.75; color:var(--text); padding-top:5px; }

  .tf-row { display:flex; gap:12px; padding:0 22px 20px; }
  .tf-btn {
    flex:1; padding:12px;
    border:1px solid var(--border);
    background:transparent; color:var(--text);
    font-family:'Space Mono',monospace; font-size:13px;
    border-radius:6px; cursor:pointer; transition:all 0.2s; letter-spacing:1px;
  }
  .tf-btn.true-btn:hover:not(:disabled)  { border-color:var(--correct); background:rgba(34,197,94,0.08);  color:var(--correct); }
  .tf-btn.false-btn:hover:not(:disabled) { border-color:var(--wrong);   background:rgba(239,68,68,0.08);  color:var(--wrong); }

  .options { padding:0 22px 20px; display:flex; flex-direction:column; gap:10px; }
  .option-btn {
    width:100%; text-align:left;
    padding:13px 16px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.02); color:var(--text);
    font-family:'Space Mono',monospace; font-size:12.5px;
    border-radius:6px; cursor:pointer; transition:all 0.18s;
    display:flex; align-items:center; gap:10px; line-height:1.5;
  }
  .option-letter {
    background:rgba(255,255,255,0.06); color:var(--muted);
    font-family:'Syne',sans-serif; font-weight:700; font-size:11px;
    min-width:26px; height:26px; border-radius:3px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:all 0.18s;
  }
  .option-btn:hover:not(:disabled) { border-color:var(--accent); background:rgba(14,165,233,0.06); }
  .option-btn:hover:not(:disabled) .option-letter { background:rgba(14,165,233,0.2); color:var(--accent); }

  .option-btn.correct, .tf-btn.correct {
    border-color:var(--correct)!important;
    background:rgba(34,197,94,0.12)!important; color:var(--correct);
  }
  .option-btn.correct .option-letter { background:var(--correct); color:#fff; }
  .option-btn.wrong, .tf-btn.wrong {
    border-color:var(--wrong)!important;
    background:rgba(239,68,68,0.1)!important; color:var(--wrong);
  }
  .option-btn.wrong .option-letter { background:var(--wrong); color:#fff; }
  .option-btn.show-correct {
    border-color:rgba(34,197,94,0.45)!important;
    background:rgba(34,197,94,0.07)!important; color:var(--correct);
  }
  .option-btn.show-correct .option-letter { background:rgba(34,197,94,0.3); color:var(--correct); }
  .option-btn:disabled, .tf-btn:disabled { cursor:default; }

  .feedback {
    margin:0 22px 18px; padding:12px 16px;
    border-radius:6px; font-size:12px; line-height:1.65; display:none;
  }
  .feedback.show { display:block; }
  .feedback.correct-fb { background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.3); color:var(--correct); }
  .feedback.wrong-fb   { background:rgba(239,68,68,0.08);  border:1px solid rgba(239,68,68,0.3);  color:var(--wrong); }
  .feedback-icon { font-size:15px; margin-right:6px; }

  .reset-wrap { max-width:860px; margin:44px auto 0; padding:0 20px; text-align:center; position:relative; z-index:1; }
  .reset-btn {
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff; border:none;
    font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
    letter-spacing:2px; padding:16px 48px; border-radius:4px;
    cursor:pointer; text-transform:uppercase; transition:opacity 0.2s,transform 0.2s;
  }
  .reset-btn:hover { opacity:0.85; transform:translateY(-2px); }

  .extra-notice { max-width:860px; margin:0 auto; padding:0 20px; position:relative; z-index:1; }
  .extra-notice-inner {
    background:rgba(249,115,22,0.07); border:1px solid rgba(249,115,22,0.28);
    border-radius:6px; padding:14px 18px;
    font-size:12px; color:var(--accent2); letter-spacing:.5px; line-height:1.65;
  }

  @keyframes slideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse-correct { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.45)} 70%{box-shadow:0 0 0 9px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }
  @keyframes pulse-wrong   { 0%{box-shadow:0 0 0 0 rgba(239,68,68,.45)} 70%{box-shadow:0 0 0 9px rgba(239,68,68,0)} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0)} }
  .q-card.answered-correct { animation:pulse-correct 0.6s ease; }
  .q-card.answered-wrong   { animation:pulse-wrong   0.6s ease; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">IS352 · Lec 3 & 4</div>
  <h1>DevOps & Scrum<br>Quiz</h1>
  <p>اختار الإجابة وشوف نتيجتك فوراً 🚀</p>
</div>

<div class="scorebar">
  <div class="score-item"><div class="score-num" id="score-correct">0</div><div class="score-label">Correct</div></div>
  <div class="score-item"><div class="score-num" id="score-wrong">0</div><div class="score-label">Wrong</div></div>
  <div class="score-item"><div class="score-num" id="score-total">0</div><div class="score-label">Answered</div></div>
  <div class="score-item"><div class="score-num" id="score-pct">—</div><div class="score-label">Score %</div></div>
</div>

<div class="section-header">
  <span class="section-badge">Part A</span>
  <span class="section-title">Original Questions (1–40)</span>
  <div class="section-line"></div>
</div>
<div class="quiz-container" id="part-a"></div>

<div class="section-header" style="margin-top:60px">
  <span class="section-badge" style="background:linear-gradient(135deg,var(--gold),#f97316)">Part B</span>
  <span class="section-title">Extra Questions from Slides</span>
  <div class="section-line"></div>
</div>
<div class="extra-notice">
  <div class="extra-notice-inner">⚡ أسئلة إضافية من السلايدز (Scrum roles, ceremonies, artifacts, DevOps lifecycle) — ممكن تيجي في الامتحان!</div>
</div>
<div class="quiz-container" id="part-b" style="margin-top:20px"></div>

<div class="reset-wrap">
  <button class="reset-btn" onclick="resetAll()">↺ Reset Quiz</button>
</div>

<script>
const partA = [
  {
    q: "1. ………… is a software development strategy which bridges the gap between the dev and the ops side of the company.",
    type:"mcq", options:["Agile","Waterfall","DevOps","Scrum"], answer:2
  },
  {
    q: "2. Which of the following is a benefit of DevOps? (select all that apply — pick the ODD one OUT)",
    type:"mcq",
    options:["Breaking Silos","Continuous Improvement","Heavyweight Documentation","Performance-oriented Culture"],
    answer:2,
    explanation:"Heavyweight Documentation is a drawback of Waterfall, NOT a DevOps benefit. DevOps benefits include Breaking Silos, Continuous Improvement, Minimized Failures, Creativity & Innovation, and Performance-oriented Culture."
  },
  {
    q: "3. Waterfall Methodology — it is a risky process.",
    type:"tf", answer:true,
    explanation:"TRUE – Waterfall is described as a risky process; it is difficult to go back and make changes at any stage."
  },
  {
    q: "4. Agile Methodology — its main focus is to help internal teams work efficiently. It excludes end-users/clients.",
    type:"tf", answer:false,
    explanation:"FALSE – This description belongs to Waterfall. Agile focuses on customer feedback and bridges the gap between Customers and Developers."
  },
  {
    q: "5. Waterfall Methodology imposes heavyweight processes like generation of unnecessary artefacts (typically documentation).",
    type:"tf", answer:true,
    explanation:"TRUE – One of Waterfall's drawbacks is imposing heavyweight processes and unnecessary documentation."
  },
  {
    q: "6. Following Waterfall, there was a gap between ………… and …………",
    type:"mcq",
    options:["Customers / Developers","Developers / Operation team","Testers / Managers","Dev / QA"],
    answer:0,
    explanation:"Following Waterfall there was a gap between customers' requirements and developers — bridged by Agile."
  },
  {
    q: "7. ………… was introduced to overcome the gap between developers and the operations team.",
    type:"mcq", options:["Agile","DevOps","Scrum","Waterfall"], answer:1,
    explanation:"DevOps was introduced specifically to overcome the gap between Developers and the Operations team."
  },
  {
    q: "8. ………… overcame the disadvantages of Waterfall and bridged the gap between Customers and Developers.",
    type:"mcq", options:["Agile","DevOps","Scrum","Kanban"], answer:0,
    explanation:"Agile overcame Waterfall's disadvantages and bridged the gap between Customers and Developers."
  },
  {
    q: "9. The true value of Agile has often been negated at the final push by traditional operational requirements.",
    type:"tf", answer:true,
    explanation:"TRUE – This is why DevOps was needed; traditional ops requirements negated the value of Agile CI/CD."
  },
  {
    q: "10. In DevOps, development has been trying to put releases into Production more frequently by delivering incremental changes.",
    type:"tf", answer:true,
    explanation:"TRUE – Development teams push frequent releases with incremental changes, while Ops tries to reduce risk by slowing change."
  },
  {
    q: "11. In ………… developers write the code on any platform.",
    type:"mcq", options:["Plan","Code","Build","Test"], answer:1,
    explanation:"In the CODE phase, developers write/code on any platform."
  },
  {
    q: "12. In ………… developers build the version of their program in any extension depending upon the language they are using.",
    type:"mcq", options:["Plan","Code","Build","Test"], answer:2,
    explanation:"In the BUILD phase, the code is compiled/built into an executable version."
  },
  {
    q: "13. In ………… it gathers information from the monitoring stage and, as per feedback, implements changes for better performance.",
    type:"mcq", options:["Plan","Code","Build","Test"], answer:0,
    explanation:"In the PLAN phase, feedback from monitoring is used to plan and implement improvements."
  },
  {
    q: "14. In ………… automation tools like Selenium are used.",
    type:"mcq", options:["Plan","Code","Build","Test"], answer:3,
    explanation:"In the TEST phase, automation tools like Selenium are used to test the code."
  },
  {
    q: "15. In ………… — process for managing, planning, scheduling, and controlling the build in different environments after testing and before deployment.",
    type:"mcq", options:["Plan","Release","Operate","Deploy"], answer:1,
    explanation:"The RELEASE phase manages and controls the build across environments after testing and before deployment."
  },
  {
    q: "16. In ………… phase it provides crucial information to ensure service uptime and optimal performance.",
    type:"mcq", options:["Monitor","Release","Operate","Deploy"], answer:0,
    explanation:"The MONITOR phase provides crucial information about service uptime and performance."
  },
  {
    q: "17. In ………… the application is run after deployment, where clients use it in real-world scenarios.",
    type:"mcq", options:["Monitor","Release","Operate","Deploy"], answer:2,
    explanation:"The OPERATE phase is where the application runs in production and clients use it."
  },
  {
    q: "18. In ………… phase all artifacts/code files of the application are deployed/executed on the server.",
    type:"mcq", options:["Monitor","Release","Operate","Deploy"], answer:3,
    explanation:"The DEPLOY phase gets all code/artifacts ready and deploys them on the server."
  },
  {
    q: "19. ………… is used to maintain different versions of the code.",
    type:"mcq", options:["GIT","Selenium","Maven","Jenkins"], answer:0,
    explanation:"GIT is the version control tool used to manage and maintain different code versions."
  },
  {
    q: "20. ………… lets QAs test the codes in parallel to ensure there is no error or flaw in the software.",
    type:"mcq", options:["GIT","Selenium","Maven","Jenkins"], answer:1,
    explanation:"Selenium is a test automation tool used for parallel testing."
  },
  {
    q: "21. ………… is the tool used for continuous integration.",
    type:"mcq", options:["GIT","Selenium","Maven","Jenkins"], answer:3,
    explanation:"Jenkins is the CI (Continuous Integration) tool."
  },
  {
    q: "22. ………… is used to build/package the code into an executable file.",
    type:"mcq", options:["GIT","Stack/Splunk/Sensu","Maven","Jenkins"], answer:2,
    explanation:"Maven is a build tool used to compile and package code into executable files."
  },
  {
    q: "23. ………… help us monitor our application and servers closely to check their health.",
    type:"mcq", options:["GIT","Stack/Splunk/Sensu","Maven","Jenkins"], answer:1,
    explanation:"Stack/Splunk/Sensu are monitoring tools that track application and server health."
  },
  {
    q: "24. In …………, the software product gets broken into multiple pieces or sub-parts to make development cycles shorter.",
    type:"mcq", options:["Waterfall","DevOps"], answer:1,
    explanation:"DevOps breaks software into smaller pieces for shorter, iterative development cycles."
  },
  {
    q: "25. In …………, the software is developed continuously.",
    type:"mcq", options:["Waterfall","DevOps"], answer:1,
    explanation:"DevOps enables continuous development of software."
  },
  {
    q: "26. Changed code should ensure there are no errors in the current environment — this is continuous …………",
    type:"mcq", options:["Development","Integration","Testing","Monitoring"], answer:1,
    explanation:"Continuous Integration ensures changed code is merged and validated — no errors in the current environment."
  },
  {
    q: "27. It provides important information that helps ensure service uptime and optimal performance.",
    type:"mcq", options:["Development","Integration","Testing","Monitoring"], answer:3,
    explanation:"Continuous Monitoring provides insights about uptime and performance."
  },
  {
    q: "28. Developed software is tested continuously to detect bugs using automation tools — this is continuous …………",
    type:"mcq", options:["Development","Integration","Testing","Monitoring"], answer:2,
    explanation:"Continuous Testing uses automated tools to continuously detect bugs."
  },
  {
    q: "29. It is a very crucial part of the DevOps life cycle — continuous …………",
    type:"mcq", options:["Development","Integration","Testing","Monitoring"], answer:1,
    explanation:"Continuous Integration is considered a very crucial part of the DevOps lifecycle."
  },
  {
    q: "30. Automates the process of deploying changes to a staging or production environment as soon as they are merged — this is continuous …………",
    type:"mcq", options:["Development","Integration","Deployment","Monitoring"], answer:2,
    explanation:"Continuous Deployment automates pushing merged changes to staging/production."
  },
  {
    q: "31. ………… is a contemporary approach that lets companies utilize numerous benefits.",
    type:"mcq", options:["Agile","Waterfall","DevOps","None of the above"], answer:2,
    explanation:"DevOps is the contemporary approach with numerous benefits like speed, collaboration, and reliability."
  },
  {
    q: "32. Any major issue detected by ………… tools is forwarded to the development team to fix in the continuous development phase.",
    type:"mcq", options:["Development","Integration","Deployment","Monitoring"], answer:3,
    explanation:"Monitoring tools detect issues and forward them to the dev team for fixes."
  },
  {
    q: "33. The conventional style of departmentation increases flexibility and responsiveness.",
    type:"tf", answer:false,
    explanation:"FALSE – Conventional departmentation (silos) REDUCES flexibility and responsiveness. DevOps breaks these silos."
  },
  {
    q: "34. DevOps stresses ………… by aligning business with IT.",
    type:"mcq",
    options:["Breaking Silos","Continuous Improvement","Minimized Failures","Creativity and Innovation"],
    answer:0,
    explanation:"Breaking Silos is about aligning business with IT so teams collaborate rather than work in isolation."
  },
  {
    q: "35. DevOps strives to increase the feedback cycle and delivery loops which, in turn, increases customer satisfaction.",
    type:"tf", answer:true,
    explanation:"TRUE – Increased feedback loops and faster delivery are core DevOps goals that lead to higher customer satisfaction."
  },
  {
    q: "36. When organizations integrate DevOps with fault detection techniques, it leads to slightly minimizing failures.",
    type:"tf", answer:false,
    explanation:"FALSE – DevOps with fault detection significantly minimizes failures, not just slightly."
  },
  {
    q: "37. Agile is usually implemented on top of the DevOps model.",
    type:"tf", answer:false,
    explanation:"FALSE – It's the opposite: DevOps is typically implemented on top of the Agile model, extending CI/CD further."
  },
  {
    q: "38. DevOps promotes collaboration, modular programming, etc., making fault detection an easy task.",
    type:"tf", answer:true,
    explanation:"TRUE – DevOps's collaborative and modular approach makes identifying and fixing faults easier."
  },
  {
    q: "39. ………… helps organizations better understand and address their customer needs.",
    type:"mcq",
    options:["Breaking Silos","Continuous Improvement","Minimized Failures","Creativity and Innovation"],
    answer:0,
    explanation:"Breaking Silos aligns teams so organizations better understand and respond to customer needs."
  },
  {
    q: "40. With DevOps, the workforce becomes more creative and productive while reducing retention issues and improving turnover.",
    type:"tf", answer:true,
    explanation:"TRUE – A Performance-oriented DevOps culture makes the workforce more creative, productive, and engaged."
  }
];

const partB = [
  {
    q: "In the Scrum framework, which role is responsible for defining product features and prioritizing the product backlog?",
    type:"mcq",
    options:["ScrumMaster","Team","Product Owner","DevOps Engineer"],
    answer:2,
    explanation:"The Product Owner defines features, sets release dates, prioritizes by market value, and accepts/rejects work."
  },
  {
    q: "The ScrumMaster is responsible for removing impediments and shielding the team from external interferences.",
    type:"tf", answer:true,
    explanation:"TRUE – The ScrumMaster removes impediments and protects the team from outside disruptions."
  },
  {
    q: "A typical Scrum team size is:",
    type:"mcq",
    options:["1–3 people","5–9 people","10–15 people","20+ people"],
    answer:1,
    explanation:"Scrum teams are typically 5–9 people, cross-functional and self-organizing."
  },
  {
    q: "Which Scrum artifact lists all desired work on the project, prioritized by the Product Owner?",
    type:"mcq",
    options:["Sprint backlog","Burndown chart","Product backlog","Sprint goal"],
    answer:2,
    explanation:"The Product Backlog is the master list of all desired work, prioritized by the Product Owner."
  },
  {
    q: "The Sprint Backlog contains tasks that individuals sign up for voluntarily — work is never assigned.",
    type:"tf", answer:true,
    explanation:"TRUE – In Scrum, team members self-select work from the sprint backlog; tasks are not assigned by the ScrumMaster."
  },
  {
    q: "In a Sprint Burndown Chart, ideally the remaining hours should burn down to ………… by the end of the sprint.",
    type:"mcq",
    options:["50%","Zero","The sprint goal","The product backlog size"],
    answer:1,
    explanation:"The Sprint Burndown Chart ideally burns down to zero — meaning all committed work is completed."
  },
  {
    q: "The Daily Scrum meeting is typically how long?",
    type:"mcq",
    options:["1 hour","30 minutes","15 minutes","45 minutes"],
    answer:2,
    explanation:"The Daily Scrum is a 15-minute stand-up meeting. It is not for problem-solving."
  },
  {
    q: "Which Scrum ceremony is a feedback meeting done after every sprint, attended by the Scrum team only?",
    type:"mcq",
    options:["Sprint Planning","Sprint Review","Sprint Retrospective","Daily Scrum"],
    answer:2,
    explanation:"The Sprint Retrospective is the feedback meeting (Start/Stop/Continue) attended by the Scrum team only, 15–30 minutes."
  },
  {
    q: "During Sprint Planning, the estimated tasks should each be between ………… hours.",
    type:"mcq",
    options:["1–4 hours","1–16 hours","8–40 hours","4–8 hours"],
    answer:1,
    explanation:"During Sprint Planning, each task is estimated between 1–16 hours."
  },
  {
    q: "In the Daily Scrum, everyone answers three questions. Which of the following is NOT one of them?",
    type:"mcq",
    options:[
      "What did you do yesterday?",
      "What will you do today?",
      "Is anything in your way?",
      "How many story points did you complete?"
    ],
    answer:3,
    explanation:"The three Daily Scrum questions are: What did you do yesterday? / What will you do today? / Is anything in your way?"
  },
  {

// ─── STATE ──────────────────────────────────────────────────────────────────
let correct=0, wrong=0, total=0;

function updateScore(isCorrect){
  if(isCorrect) correct++; else wrong++;
  total++;
  document.getElementById('score-correct').textContent = correct;
  document.getElementById('score-wrong').textContent   = wrong;
  document.getElementById('score-total').textContent   = total;
  document.getElementById('score-pct').textContent     = Math.round((correct/total)*100)+'%';
}

function renderQuestions(data, containerId){
  const container = document.getElementById(containerId);
  const letters   = ['a','b','c','d','e'];
  data.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.style.animationDelay = (idx*0.04)+'s';
    card.id = `${containerId}-q${idx}`;

    const header = `<div class="q-header">
      <div class="q-num">${idx+1}</div>
      <div class="q-text">${q.q}</div>
    </div>`;

    let body = '';
    const exp = (q.explanation||'').replace(/`/g,"'");

    if(q.type==='tf'){
      body = `<div class="tf-row">
        <button class="tf-btn true-btn"  onclick="checkTF(this,true,${q.answer},'${containerId}-q${idx}',\`${exp}\`)">✔ TRUE</button>
        <button class="tf-btn false-btn" onclick="checkTF(this,false,${q.answer},'${containerId}-q${idx}',\`${exp}\`)">✘ FALSE</button>
      </div>`;
    } else {
      const opts = q.options.map((o,i)=>`
        <button class="option-btn"
          onclick="checkMCQ(this,${i},${q.answer},'${containerId}-q${idx}',\`${exp}\`,${q.options.length})">
          <span class="option-letter">${letters[i]}</span>${o}
        </button>`).join('');
      body = `<div class="options">${opts}</div>`;
    }

    const feedback = `<div class="feedback" id="fb-${containerId}-q${idx}"></div>`;
    card.innerHTML = header + body + feedback;
    container.appendChild(card);
  });
}

function checkMCQ(btn, chosen, correctIdx, cardId, explanation, numOpts){
  const card    = document.getElementById(cardId);
  const allBtns = card.querySelectorAll('.option-btn');
  allBtns.forEach(b=>b.disabled=true);
  const isCorrect = chosen===correctIdx;
  if(isCorrect){ btn.classList.add('correct'); card.classList.add('answered-correct'); }
  else { btn.classList.add('wrong'); allBtns[correctIdx].classList.add('show-correct'); card.classList.add('answered-wrong'); }
  showFeedback(cardId, isCorrect, explanation);
  updateScore(isCorrect);
  setTimeout(()=>card.classList.remove('answered-correct','answered-wrong'),700);
}

function checkTF(btn, chosen, correctAnswer, cardId, explanation){
  const card    = document.getElementById(cardId);
  const allBtns = card.querySelectorAll('.tf-btn');
  allBtns.forEach(b=>b.disabled=true);
  const isCorrect = chosen===correctAnswer;
  if(isCorrect){ btn.classList.add('correct'); card.classList.add('answered-correct'); }
  else{
    btn.classList.add('wrong');
    allBtns.forEach(b=>{
      const isTrue = b.classList.contains('true-btn');
      if((isTrue&&correctAnswer)||(!isTrue&&!correctAnswer)) b.classList.add('show-correct');
    });
    card.classList.add('answered-wrong');
  }
  showFeedback(cardId, isCorrect, explanation);
  updateScore(isCorrect);
  setTimeout(()=>card.classList.remove('answered-correct','answered-wrong'),700);
}

function showFeedback(cardId, isCorrect, explanation){
  const fb = document.getElementById(`fb-${cardId}`);
  fb.className = `feedback show ${isCorrect?'correct-fb':'wrong-fb'}`;
  fb.innerHTML = isCorrect
    ? `<span class="feedback-icon">✅</span> Correct! ${explanation||'Well done!'}`
    : `<span class="feedback-icon">❌</span> Wrong. ${explanation||'Check the correct answer above.'}`;
}

function resetAll(){
  correct=0; wrong=0; total=0;
  ['score-correct','score-wrong','score-total'].forEach(id=>document.getElementById(id).textContent='0');
  document.getElementById('score-pct').textContent='—';
  document.getElementById('part-a').innerHTML='';
  document.getElementById('part-b').innerHTML='';
  renderQuestions(partA,'part-a');
  renderQuestions(partB,'part-b');
}

renderQuestions(partA,'part-a');
renderQuestions(partB,'part-b');
</script>
