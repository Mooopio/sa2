<html lang="en">
<head>

<title>SOA & Microservices Quiz – Lec 7</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131c;
    --border: #2a2a3e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --correct: #10b981;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --gold: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* BG Grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .hero {
    position: relative;
    text-align: center;
    padding: 60px 20px 40px;
    z-index: 1;
  }

  .hero-tag {
    display: inline-block;
    background: rgba(124,58,237,0.15);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 3px;
    padding: 6px 16px;
    border-radius: 2px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .hero p {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* Score Bar */
  .scorebar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 14px 20px;
  }

  .score-item {
    text-align: center;
  }

  .score-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
  }

  .score-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  #score-correct { color: var(--correct); }
  #score-wrong { color: var(--wrong); }
  #score-total { color: var(--accent2); }

  /* Sections */
  .section-header {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 50px auto 24px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .section-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 6px 14px;
    border-radius: 2px;
    white-space: nowrap;
    text-transform: uppercase;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    color: #fff;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Quiz Container */
  .quiz-container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* Question Card */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .q-card:hover { border-color: #3a3a5e; }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 20px 22px 16px;
  }

  .q-num {
    background: rgba(124,58,237,0.15);
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    min-width: 36px;
    height: 36px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 1px solid rgba(124,58,237,0.3);
  }

  .q-text {
    font-size: 13.5px;
    line-height: 1.7;
    color: var(--text);
    padding-top: 6px;
  }

  /* True/False */
  .tf-row {
    display: flex;
    gap: 12px;
    padding: 0 22px 20px;
  }

  .tf-btn {
    flex: 1;
    padding: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .tf-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(124,58,237,0.08);
  }

  .tf-btn.true-btn:hover:not(:disabled) { border-color: var(--correct); background: rgba(16,185,129,0.08); }
  .tf-btn.false-btn:hover:not(:disabled) { border-color: var(--wrong); background: rgba(239,68,68,0.08); }

  /* Options */
  .options {
    padding: 0 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    width: 100%;
    text-align: left;
    padding: 13px 16px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12.5px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 10px;
    line-height: 1.5;
  }

  .option-letter {
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 11px;
    min-width: 26px;
    height: 26px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(6,182,212,0.06);
  }

  .option-btn:hover:not(:disabled) .option-letter {
    background: rgba(6,182,212,0.2);
    color: var(--accent2);
  }

  /* Result States */
  .option-btn.correct, .tf-btn.correct {
    border-color: var(--correct) !important;
    background: rgba(16,185,129,0.12) !important;
    color: var(--correct);
  }

  .option-btn.correct .option-letter {
    background: var(--correct);
    color: #fff;
  }

  .option-btn.wrong, .tf-btn.wrong {
    border-color: var(--wrong) !important;
    background: rgba(239,68,68,0.1) !important;
    color: var(--wrong);
  }

  .option-btn.wrong .option-letter {
    background: var(--wrong);
    color: #fff;
  }

  .option-btn.show-correct {
    border-color: rgba(16,185,129,0.4) !important;
    background: rgba(16,185,129,0.06) !important;
    color: var(--correct);
  }

  .option-btn.show-correct .option-letter {
    background: rgba(16,185,129,0.3);
    color: var(--correct);
  }

  .option-btn:disabled, .tf-btn:disabled { cursor: default; }

  /* Feedback */
  .feedback {
    margin: 0 22px 18px;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.6;
    display: none;
  }

  .feedback.show { display: block; }

  .feedback.correct-fb {
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.3);
    color: var(--correct);
  }

  .feedback.wrong-fb {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--wrong);
  }

  .feedback-icon { font-size: 16px; margin-right: 6px; }

  /* Reset Btn */
  .reset-wrap {
    max-width: 860px;
    margin: 40px auto 0;
    padding: 0 20px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .reset-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 16px 48px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.2s, transform 0.2s;
  }

  .reset-btn:hover { opacity: 0.85; transform: translateY(-2px); }

  /* Pulse animation for answered */
  @keyframes pulse-correct {
    0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
    70% { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
    100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
  }

  @keyframes pulse-wrong {
    0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
    70% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
  }

  .q-card.answered-correct { animation: pulse-correct 0.6s ease; }
  .q-card.answered-wrong { animation: pulse-wrong 0.6s ease; }

  /* Slide-in */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-card { animation: slideIn 0.3s ease both; }

  /* Extra Questions notice */
  .extra-notice {
    max-width: 860px;
    margin: 0 auto 0;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }

  .extra-notice-inner {
    background: rgba(245,158,11,0.06);
    border: 1px solid rgba(245,158,11,0.25);
    border-radius: 6px;
    padding: 14px 18px;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.5px;
    line-height: 1.6;
  }
</style>
</head>
